# Append these lines to Raspberry Pi config.txt for HamWing audio path
# Typical paths:
#   /boot/firmware/config.txt   (Bookworm/Trixie)
#   /boot/config.txt            (older images)

# Enable bcm2835 analog audio stack
dtparam=audio=on

# Higher-quality PWM audio mode
audio_pwm_mode=2

# Map PWM audio channels to GPIO12/GPIO13
# (Do not tie channels directly together; combine via resistor network)
dtoverlay=pwm-2chan,pin=12,func=4,pin2=13,func2=4
