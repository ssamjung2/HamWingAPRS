# pi_sstv.cfg - mission template for ~2.5 hour HAB flight

[mission]
schedule = hab_cruise
total = 900
interval = 10
callsign = KW9D
min_captures_between_transmissions = 12

[radio]
# Select TX keying target: vhf, uhf, or both
band = uhf
rolling_duty_cycle_window_seconds = 3600
max_transmit_duty_cycle = 0.25
cooldown_scale_factor = 1.0
radio_wake_delay_seconds = 1
ptt_key_delay_seconds = 0.1
post_playback_delay_seconds = 0.5

[capture]
quality = 93
metering = matrix
exposure = sport
awb = auto
capture_file_timeout = 8

[encode]
format = wav
sample_rate = 22050
aspect = center
verbose = false
sstv_conversion_settle_seconds = 0.5

[overlay]
enable_timestamp = true
timestamp_size = 11
timestamp_position = top-left
timestamp_color = white
timestamp_background_color = black
timestamp_background_opacity = 70

enable_callsign = true
callsign_size = 13
callsign_position = top-right
callsign_color = white
callsign_background_color = black

[mmsstv]
# Optional shared library path for PD/Robot MMSSTV modes
lib_path =
disable = false

[gps]
enable = false
device = /dev/serial0
baud = 9600
units = m
